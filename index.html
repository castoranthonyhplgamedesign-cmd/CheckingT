<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Adventure Land</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .container { text-align: center; max-width: 500px; padding: 40px; }
    h1 { font-size: 2rem; margin-bottom: 10px; color: #f0c040; }
    p { margin-bottom: 20px; color: #aaa; }
    code { background: #2a2a4e; padding: 8px 16px; border-radius: 6px; display: inline-block; margin: 10px 0; font-size: 0.95rem; color: #7fdbca; }
    .steps { text-align: left; background: #16213e; padding: 20px 30px; border-radius: 10px; margin-top: 20px; }
    .steps li { margin: 8px 0; line-height: 1.5; }
    .highlight { color: #f0c040; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Adventure Land</h1>
    <p>Compressed build (8.1MB zip)</p>
    <div class="steps">
      <p class="highlight">To run the game:</p>
      <ol>
        <li>Open a terminal in this folder</li>
        <li>Run: <code>node server.cjs</code></li>
        <li>Open <a href="http://localhost:4000" style="color:#7fdbca;">http://localhost:4000</a></li>
      </ol>
    </div>
    <p style="margin-top:20px; font-size:0.85rem; color:#666;">
      The server auto-extracts dist.zip on first run and serves with gzip compression.
    </p>
  </div>
</body>
</html>
